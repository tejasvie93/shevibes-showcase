<svg width="90" height="32" viewBox="0 0 90 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- "pif" text -->
  <text x="0" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="800" font-size="22" fill="white" letter-spacing="-0.5">pif</text>

  <!-- Starburst / asterisk icon at x=52, y=16 -->
  <g transform="translate(52,16)">
    <!-- 8 radiating spokes -->
    <line x1="0" y1="-4.5" x2="0" y2="4.5" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>
    <line x1="-4.5" y1="0" x2="4.5" y2="0" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>
    <line x1="-3.18" y1="-3.18" x2="3.18" y2="3.18" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>
    <line x1="3.18" y1="-3.18" x2="-3.18" y2="3.18" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>
    <!-- dot ring at radius 8 — 12 dots -->
    <circle cx="0"    cy="-8"   r="1.1" fill="#F5A623"/>
    <circle cx="4"    cy="-6.93" r="1.1" fill="#F5A623"/>
    <circle cx="6.93" cy="-4"   r="1.1" fill="#F5A623"/>
    <circle cx="8"    cy="0"    r="1.1" fill="#F5A623"/>
    <circle cx="6.93" cy="4"    r="1.1" fill="#F5A623"/>
    <circle cx="4"    cy="6.93" r="1.1" fill="#F5A623"/>
    <circle cx="0"    cy="8"    r="1.1" fill="#F5A623"/>
    <circle cx="-4"   cy="6.93" r="1.1" fill="#F5A623"/>
    <circle cx="-6.93" cy="4"   r="1.1" fill="#F5A623"/>
    <circle cx="-8"   cy="0"    r="1.1" fill="#F5A623"/>
    <circle cx="-6.93" cy="-4"  r="1.1" fill="#F5A623"/>
    <circle cx="-4"   cy="-6.93" r="1.1" fill="#F5A623"/>
  </g>

  <!-- "o" text -->
  <text x="63" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="800" font-size="22" fill="white" letter-spacing="-0.5">o</text>
</svg>
